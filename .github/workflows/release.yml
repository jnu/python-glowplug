name: Release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release to GitHub and PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              print(tomllib.load(pyproject)["project"]["version"])
          PY
          )"

          previous_version="$(python - <<'PY'
          import os
          import subprocess
          import sys
          import tomllib

          before_sha = os.environ["BEFORE_SHA"]
          if not before_sha or set(before_sha) == {"0"}:
              sys.exit(0)

          try:
              previous_pyproject = subprocess.check_output(
                  ["git", "show", f"{before_sha}:pyproject.toml"],
                  stderr=subprocess.DEVNULL,
              )
          except subprocess.CalledProcessError:
              sys.exit(0)

          print(tomllib.loads(previous_pyproject.decode())["project"]["version"])
          PY
          )"

          changed=false
          if [[ "$current_version" != "$previous_version" ]]; then
            changed=true
          fi

          tag="v${current_version}"
          if [[ "$changed" == "true" ]] && git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error title=Release tag already exists::${tag} already exists on origin."
            exit 1
          fi

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
        env:
          BEFORE_SHA: ${{ github.event.before }}

      - name: Set up uv
        if: steps.version.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build distributions
        if: steps.version.outputs.changed == 'true'
        run: uv build

      - name: Tag release commit
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
        env:
          TAG: ${{ steps.version.outputs.tag }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*

      - name: Publish to PyPI
        if: steps.version.outputs.changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
